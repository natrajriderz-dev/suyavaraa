<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suyavaraa Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2.49.2/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .stat-card { border-radius: 12px; padding: 16px; background: white; border: 1px solid #e2e8f0; }
    .stat-card.danger { border-color: #fecaca; background: #fef2f2; }
    .stat-card.warning { border-color: #fde68a; background: #fffbeb; }
    .stat-card.info { border-color: #bfdbfe; background: #eff6ff; }
    .tab-btn { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; background: #f1f5f9; color: #334155; border: none; cursor: pointer; transition: all 0.15s; }
    .tab-btn.active { background: #0f766e; color: white; }
    .tab-btn:hover:not(.active) { background: #e2e8f0; }
    .btn { padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 700; border: none; cursor: pointer; margin-right: 6px; }
    .btn-primary { background: #0f766e; color: white; }
    .btn-muted { background: #e2e8f0; color: #334155; }
    .btn-danger { background: #dc2626; color: white; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; margin-bottom: 8px; }
    .section-title { font-size: 16px; font-weight: 700; color: #0f172a; margin-bottom: 8px; margin-left: 2px; margin-top: 16px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
    .modal-content { background: white; border-radius: 16px; padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    select, input[type="text"], input[type="email"], input[type="password"], input[type="search"] {
      border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 12px; font-size: 14px; width: 100%; outline: none; }
    select:focus, input:focus { border-color: #0f766e; box-shadow: 0 0 0 2px rgba(15,118,110,0.15); }
    @media (max-width: 640px) { .sidebar { display: none; } .main-content { margin-left: 0; } }
  </style>
</head>
<body class="bg-slate-50 font-sans antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const shortId = (id) => id ? id.slice(0, 8) + '...' : 'unknown';
    const fmt = (iso) => iso ? new Date(iso).toLocaleString() : '—';

    // Initialize Supabase — credentials must be provided via URL params or config
    // Usage: admin.html?url=https://your-project.supabase.co&key=your-anon-key
    const urlParams = new URLSearchParams(window.location.search);
    const supabaseUrl = window.__SUYAVARAA_SUPABASE_URL__ || urlParams.get('url') || '';
    const supabaseAnonKey = window.__SUYAVARAA_SUPABASE_ANON_KEY__ || urlParams.get('key') || '';

    if (!supabaseUrl || !supabaseAnonKey) {
      console.error('❌ Supabase credentials not configured. Pass ?url=...&key=... in the URL or set window.__SUYAVARAA_SUPABASE_URL__ and window.__SUYAVARAA_SUPABASE_ANON_KEY__');
    }

    const supabase = (supabaseUrl && supabaseAnonKey && window.supabase?.createClient)
      ? window.supabase.createClient(supabaseUrl, supabaseAnonKey)
      : null;

    const StatCard = ({ label, value, tone }) =>
      React.createElement('div', { className: `stat-card flex-1 mx-1 ${tone === 'danger' ? 'danger' : ''} ${tone === 'warning' ? 'warning' : ''} ${tone === 'info' ? 'info' : ''}` },
        React.createElement('div', { className: 'text-2xl font-extrabold text-slate-900' }, value),
        React.createElement('div', { className: 'text-xs text-slate-600 mt-1' }, label)
      );

    const SmallBtn = ({ text, onClick, kind }) =>
      React.createElement('button', {
        className: `btn ${kind === 'muted' ? 'btn-muted' : kind === 'danger' ? 'btn-danger' : 'btn-primary'}`,
        onClick
      }, text);

    const LoginScreen = ({ onLogin, error }) => {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [loginError, setLoginError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!email || !password) { setLoginError('Please fill in all fields'); return; }
        setLoading(true);
        setLoginError('');
        try {
          await onLogin(email, password);
        } catch (err) {
          setLoginError(err.message || 'Invalid login credentials');
        } finally {
          setLoading(false);
        }
      };

      return React.createElement('div', { className: 'min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-800 to-slate-900 p-4' },
        React.createElement('div', { className: 'bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md' },
          React.createElement('div', { className: 'text-center mb-8' },
            React.createElement('div', { className: 'text-4xl mb-3' }, '🛡️'),
            React.createElement('h1', { className: 'text-2xl font-bold text-slate-900' }, 'Admin Login'),
            React.createElement('p', { className: 'text-sm text-slate-500 mt-1' }, 'Suyavaraa Moderation Console')
          ),
          !supabase ? React.createElement('div', { className: 'bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm mb-4' },
            'Supabase not configured. Pass ?url=YOUR_URL&key=YOUR_ANON_KEY in the URL.'
          ) : null,
          loginError ? React.createElement('div', { className: 'bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm mb-4' }, loginError) : null,
          React.createElement('form', { onSubmit: handleSubmit, className: 'space-y-4' },
            React.createElement('div', null,
              React.createElement('label', { className: 'block text-sm font-medium text-slate-700 mb-1' }, 'Email'),
              React.createElement('input', { type: 'email', value: email, onChange: e => setEmail(e.target.value), placeholder: 'admin@example.com', className: 'w-full', required: true })
            ),
            React.createElement('div', null,
              React.createElement('label', { className: 'block text-sm font-medium text-slate-700 mb-1' }, 'Password'),
              React.createElement('input', { type: 'password', value: password, onChange: e => setPassword(e.target.value), placeholder: 'Enter password', className: 'w-full', required: true })
            ),
            React.createElement('button', {
              type: 'submit',
              disabled: loading || !supabase,
              className: 'w-full bg-teal-700 text-white font-bold py-3 px-4 rounded-xl hover:bg-teal-800 disabled:opacity-50 transition-colors'
            }, loading ? 'Signing in...' : 'Sign In')
          )
        )
      );
    };

    // Mock service calls when no real supabase
    const callService = async (fn) => {
      try { return await fn(); } catch (e) { console.warn('Service call failed:', e.message); return null; }
    };

    const App = () => {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [adminUser, setAdminUser] = useState(null);
      const [activeTab, setActiveTab] = useState('Overview');
      const [data, setData] = useState({
        users: [], reports: [], feedback: [], blocks: [], deepfakeScans: [],
        autoRemovals: [], verificationQueue: [], pendingPhotos: [], pendingPosts: [],
        escalatedSupport: [], adminTeam: [], activityLog: []
      });
      const [searchTerm, setSearchTerm] = useState('');
      const [searchResults, setSearchResults] = useState([]);
      const [banModal, setBanModal] = useState(null);

      const loadData = useCallback(async () => {
        if (!isLoggedIn) return;
        // Try to load from real service
        try {
          const [users, verificationQueue, adminTeam, activityLog] = await Promise.all([
            callService(() => supabase?.from('users').select('id, full_name, email, trust_score, is_banned, is_verified, verification_status, phone_verification_status, id_verification_status, created_at').limit(50).order('created_at', { ascending: false })),
            callService(() => supabase?.from('verification_requests').select('id, user_id, media_url, selfie_url, id_card_url, phone_number, request_type, status, created_at').eq('status', 'pending').limit(30).order('created_at', { ascending: true })),
            callService(() => supabase?.from('admin_users').select('user_id, role, is_active, created_at').limit(20).order('created_at', { ascending: false })),
            callService(() => supabase?.from('admin_activity_log').select('id, admin_id, action, target_type, target_id, details, created_at').limit(30).order('created_at', { ascending: false })),
          ]);
          setData(prev => ({
            ...prev,
            users: users?.data || prev.users,
            verificationQueue: verificationQueue?.data || prev.verificationQueue,
            adminTeam: adminTeam?.data || prev.adminTeam,
            activityLog: activityLog?.data || prev.activityLog,
          }));
        } catch (e) { /* ignore */ }
      }, [isLoggedIn]);

      useEffect(() => { if (isLoggedIn) loadData(); }, [isLoggedIn, loadData]);

      const handleVerificationAction = async (item, approved) => {
        if (!supabase || !adminUser) return;
        const status = approved ? 'approved' : 'rejected';
        const now = new Date().toISOString();

        const { error: requestError } = await supabase
          .from('verification_requests')
          .update({ status, reviewed_at: now, reviewed_by: adminUser.id })
          .eq('id', item.id);

        if (requestError) throw requestError;

        const userPayload = approved
          ? {
              is_verified: true,
              verification_status: 'verified',
              selfie_verified_at: now,
              trust_level: 'green_verified',
              id_card_url: item.id_card_url || null,
              id_verification_status: item.id_card_url ? 'verified' : 'not_submitted',
              updated_at: now,
            }
          : {
              verification_status: 'rejected',
              id_verification_status: item.id_card_url ? 'rejected' : 'not_submitted',
              updated_at: now,
            };

        const { error: userError } = await supabase
          .from('users')
          .update(userPayload)
          .eq('id', item.user_id);

        if (userError) throw userError;
        await loadData();
      };

      const handleUserBanToggle = async (user) => {
        if (!supabase || !adminUser) return;
        const { error } = await supabase
          .from('users')
          .update({
            is_banned: !user.is_banned,
            ban_reason: user.is_banned ? null : 'Actioned by admin dashboard',
            ban_expires_at: null,
          })
          .eq('id', user.id);

        if (error) throw error;
        setBanModal(null);
        await loadData();
      };

      const handleLogin = async (email, password) => {
        if (!supabase) {
          throw new Error('Supabase not configured. Cannot authenticate.');
        }

        const { data: authData, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        if (!authData?.user) throw new Error('No user returned');

        const { data: adminCheck } = await supabase.from('admin_users').select('role, is_active').eq('user_id', authData.user.id).single();
        if (!adminCheck) throw new Error('Not authorized as admin');
        if (adminCheck.is_active === false) throw new Error('Privileged access has been disabled for this user');

        setAdminUser({ id: authData.user.id, email, role: adminCheck.role });
        setIsLoggedIn(true);
      };

      if (!isLoggedIn) {
        return React.createElement(LoginScreen, { onLogin: handleLogin });
      }

      const tabs = ['Overview', 'Reports', 'Verification', 'Photos', 'Posts', 'Support', 'Users', 'Team', 'Activity'];
      const pendingReports = data.reports.filter(r => r.status === 'pending').length;
      const pendingVerifications = data.verificationQueue.length;
      const pendingPhotos = data.pendingPhotos.length;
      const canReviewVerifications = adminUser.role === 'admin' || adminUser.role === 'super_admin';

      const renderOverview = () =>
        React.createElement('div', null,
          React.createElement('div', { className: 'flex flex-row gap-2 mb-4' },
            React.createElement(StatCard, { label: 'Pending Reports', value: pendingReports, tone: 'danger' }),
            React.createElement(StatCard, { label: 'Pending Verifications', value: pendingVerifications, tone: 'warning' }),
            React.createElement(StatCard, { label: 'Pending Photos', value: pendingPhotos, tone: 'info' })
          ),
          React.createElement('div', { className: 'flex flex-row gap-2' },
            React.createElement(StatCard, { label: 'Pending Posts', value: data.pendingPosts.length, tone: 'danger' }),
            React.createElement(StatCard, { label: 'Escalated Support', value: data.escalatedSupport.length, tone: 'warning' }),
            React.createElement(StatCard, { label: 'Activity Log', value: data.activityLog.length, tone: 'info' })
          )
        );

      const renderSection = (title, items, renderItem, emptyText) =>
        React.createElement('div', null,
          React.createElement('h2', { className: 'section-title' }, title),
          items.length === 0
            ? React.createElement('p', { className: 'text-slate-500 text-sm ml-1' }, emptyText || 'No items')
            : items.slice(0, 10).map(item => renderItem(item))
        );

      const renderReports = () => renderSection('Reports Queue', data.reports.filter(r => r.status === 'pending'),
        (r) => React.createElement('div', { key: r.id, className: 'card' },
          React.createElement('div', { className: 'flex justify-between items-start' },
            React.createElement('div', null,
              React.createElement('div', { className: 'font-bold text-slate-900' }, `${r.category || 'general'} \u2022 ${r.severity || 'medium'}`),
              React.createElement('div', { className: 'text-xs text-slate-600 mt-1' }, `Reporter: ${shortId(r.reporter_id)}`),
              React.createElement('p', { className: 'text-xs text-slate-700 mt-2' }, r.reason),
              React.createElement('div', { className: 'text-xs text-slate-400 mt-2' }, fmt(r.created_at))
            )
          ),
          React.createElement('div', { className: 'flex mt-2' },
            React.createElement(SmallBtn, { text: 'Resolve', onClick: () => {} }),
            React.createElement(SmallBtn, { text: 'Dismiss', kind: 'muted', onClick: () => {} })
          )
        ), 'No pending reports');

      const renderUsers = () => {
        const results = searchResults.length > 0 ? searchResults : data.users;
        return React.createElement('div', null,
          React.createElement('h2', { className: 'section-title' }, 'User Management'),
          React.createElement('div', { className: 'flex mb-4 gap-2' },
            React.createElement('input', { type: 'search', placeholder: 'Search users by name or email...', value: searchTerm, onChange: e => setSearchTerm(e.target.value), className: 'flex-1' }),
            React.createElement('button', { className: 'btn btn-primary', onClick: () => {
              const term = searchTerm.toLowerCase();
              setSearchResults(data.users.filter(u => u.full_name?.toLowerCase().includes(term) || u.email?.toLowerCase().includes(term)));
            }}, 'Search')
          ),
          results.length === 0
            ? React.createElement('p', { className: 'text-slate-500 text-sm ml-1' }, 'No matching users')
            : results.slice(0, 10).map(user =>
              React.createElement('div', { key: user.id, className: 'card' },
                React.createElement('div', { className: 'flex justify-between items-start' },
                  React.createElement('div', null,
                    React.createElement('div', { className: 'font-bold text-slate-900' }, user.full_name || user.email),
                    React.createElement('div', { className: 'text-xs text-slate-600' }, user.email),
                    React.createElement('div', { className: 'text-xs text-slate-600 mt-1' },
                      `Trust: ${user.trust_score ?? '—'} | Status: ${user.is_banned ? 'Banned' : 'Active'}${user.is_verified ? ' | Verified' : ''}`
                    ),
                    React.createElement('div', { className: 'text-xs text-slate-600 mt-1' },
                      `Verification: ${user.verification_status || 'unverified'} | Phone: ${user.phone_verification_status || 'unverified'} | ID: ${user.id_verification_status || 'not_submitted'}`
                    ),
                    React.createElement('div', { className: 'text-xs text-slate-400 mt-1' }, fmt(user.created_at))
                  ),
                  canReviewVerifications ? React.createElement('div', { className: 'flex gap-1' },
                    React.createElement(SmallBtn, {
                      text: user.is_banned ? 'Unban' : 'Ban',
                      kind: user.is_banned ? 'primary' : 'danger',
                      onClick: () => setBanModal(user)
                    })
                  ) : React.createElement('div', { className: 'text-xs text-slate-500' }, 'Executive view')
                )
              )
            )
        );
      };

      const renderVerification = () => renderSection('Verification Review Queue', data.verificationQueue,
        (item) => React.createElement('div', { key: item.id, className: 'card' },
          React.createElement('div', { className: 'font-bold text-slate-900' }, `User: ${shortId(item.user_id)}`),
          React.createElement('div', { className: 'text-xs text-slate-600 mt-1' }, `${item.request_type || 'selfie_only'} • ${item.phone_number || 'no phone'}`),
          React.createElement('div', { className: 'text-xs text-slate-700 mt-2 break-all' }, `Selfie/Video: ${item.selfie_url || item.media_url || 'n/a'}`),
          React.createElement('div', { className: 'text-xs text-slate-700 mt-1 break-all' }, `ID Card: ${item.id_card_url || 'Not attached'}`),
          React.createElement('div', { className: 'text-xs text-slate-400 mt-2' }, fmt(item.created_at)),
          React.createElement('div', { className: 'flex mt-2' },
            canReviewVerifications
              ? React.createElement(React.Fragment, null,
                  React.createElement(SmallBtn, { text: 'Approve', onClick: () => handleVerificationAction(item, true) }),
                  React.createElement(SmallBtn, { text: 'Reject', kind: 'muted', onClick: () => handleVerificationAction(item, false) })
                )
              : React.createElement('span', { className: 'text-xs text-slate-500' }, 'Executive read-only access')
          )
        ), 'No pending verification requests');

      const renderActivity = () => renderSection('Activity Log', data.activityLog,
        (item) => React.createElement('div', { key: item.id, className: 'card' },
          React.createElement('div', { className: 'font-bold text-slate-900' }, item.action),
          React.createElement('div', { className: 'text-xs text-slate-600 mt-1' }, `${item.target_type || 'none'} | Admin: ${shortId(item.admin_id)}`),
          item.details && React.createElement('pre', { className: 'text-xs text-slate-500 mt-1 overflow-x-auto' }, typeof item.details === 'string' ? item.details : JSON.stringify(item.details, null, 2)),
          React.createElement('div', { className: 'text-xs text-slate-400 mt-2' }, fmt(item.created_at))
        ), 'No activity logged');

      const tabContent = {
        Overview: renderOverview(),
        Reports: renderReports(),
        Verification: renderVerification(),
        Photos: () => renderSection('Photo Approval Queue', data.pendingPhotos,
          (item) => React.createElement('div', { key: item.id, className: 'card' },
            React.createElement('div', { className: 'font-bold text-slate-900' }, `User: ${shortId(item.user_id)}`),
            React.createElement('div', { className: 'text-xs text-slate-600' }, `${item.photo_type} \u2022 ${item.status}`),
            React.createElement('div', { className: 'text-xs text-slate-400 mt-2' }, fmt(item.created_at)),
            React.createElement('div', { className: 'flex mt-2' },
              React.createElement(SmallBtn, { text: 'Approve', onClick: () => {} }),
              React.createElement(SmallBtn, { text: 'Reject', kind: 'muted', onClick: () => {} })
            )
          ), 'No pending photos')(),
        Posts: () => renderSection('Impress Post Queue', data.pendingPosts,
          (item) => React.createElement('div', { key: item.id, className: 'card' },
            React.createElement('div', { className: 'font-bold text-slate-900' }, `User: ${shortId(item.user_id)}`),
            React.createElement('div', { className: 'text-xs text-slate-600' }, `Status: ${item.status}`),
            React.createElement('div', { className: 'text-xs text-slate-700 mt-2' }, item.caption || 'No caption'),
            React.createElement('div', { className: 'text-xs text-slate-400 mt-2' }, fmt(item.created_at)),
            React.createElement('div', { className: 'flex mt-2' },
              React.createElement(SmallBtn, { text: 'Approve', onClick: () => {} }),
              React.createElement(SmallBtn, { text: 'Reject', kind: 'muted', onClick: () => {} })
            )
          ), 'No pending posts')(),
        Support: () => renderSection('Escalated Support', data.escalatedSupport,
          (item) => React.createElement('div', { key: item.id, className: 'card' },
            React.createElement('div', { className: 'font-bold text-slate-900' }, `Conversation: ${shortId(item.id)}`),
            React.createElement('div', { className: 'text-xs text-slate-600' }, `User: ${shortId(item.user_id)} \u2022 ${item.category}`),
            React.createElement('div', { className: 'text-xs text-slate-700 mt-1' }, `Status: ${item.status}`),
            React.createElement('div', { className: 'text-xs text-slate-400 mt-2' }, fmt(item.created_at))
          ), 'No escalated conversations')(),
        Users: renderUsers(),
        Team: () => renderSection('Admin Team', data.adminTeam,
          (item) => React.createElement('div', { key: item.user_id, className: 'card' },
            React.createElement('div', { className: 'font-bold text-slate-900' }, item.role?.toUpperCase()),
            React.createElement('div', { className: 'text-xs text-slate-600' }, `User ID: ${shortId(item.user_id)}`),
            React.createElement('div', { className: 'text-xs text-slate-600' }, `Active: ${item.is_active ? 'Yes' : 'No'}`),
            React.createElement('div', { className: 'text-xs text-slate-400 mt-2' }, fmt(item.created_at))
          ), 'No admin team members found')(),
        Activity: renderActivity()
      };

      return React.createElement('div', { className: 'min-h-screen bg-slate-50' },
        // Header
        React.createElement('header', { className: 'bg-white border-b border-slate-200 px-6 py-4' },
          React.createElement('div', { className: 'flex items-center justify-between max-w-7xl mx-auto' },
            React.createElement('div', { className: 'flex items-center gap-3' },
              React.createElement('span', { className: 'text-2xl' }, '🛡️'),
              React.createElement('div', null,
                React.createElement('h1', { className: 'text-xl font-extrabold text-slate-900' }, 'Suyavaraa Admin Safety Console'),
                React.createElement('p', { className: 'text-xs text-slate-500' }, `${adminUser.email} (${adminUser.role})`)
              )
            ),
            React.createElement('button', {
              className: 'text-sm text-slate-600 hover:text-slate-800 font-medium',
              onClick: () => { setIsLoggedIn(false); setAdminUser(null); }
            }, 'Sign Out')
          )
        ),
        // Tab bar
        React.createElement('div', { className: 'bg-white border-b border-slate-200 px-6 py-2' },
          React.createElement('div', { className: 'flex gap-2 overflow-x-auto max-w-7xl mx-auto' },
            tabs.map(tab =>
              React.createElement('button', {
                key: tab,
                className: `tab-btn whitespace-nowrap ${activeTab === tab ? 'active' : ''}`,
                onClick: () => setActiveTab(tab)
              }, tab)
            )
          )
        ),
        // Content
        React.createElement('main', { className: 'max-w-7xl mx-auto px-6 py-6' },
          tabContent[activeTab] || null
        ),
        // Ban modal
        banModal && React.createElement('div', { className: 'modal-overlay', onClick: () => setBanModal(null) },
          React.createElement('div', { className: 'modal-content', onClick: e => e.stopPropagation() },
            React.createElement('h2', { className: 'text-lg font-bold text-slate-900 mb-4' },
              banModal.is_banned ? 'Unban User' : 'Ban User'
            ),
            React.createElement('p', { className: 'text-sm text-slate-600 mb-4' },
              `Are you sure you want to ${banModal.is_banned ? 'unban' : 'ban'} ${banModal.full_name || banModal.email}?`
            ),
            React.createElement('div', { className: 'flex justify-end gap-3' },
              React.createElement('button', { className: 'btn btn-muted', onClick: () => setBanModal(null) }, 'Cancel'),
              React.createElement('button', {
                className: banModal.is_banned ? 'btn btn-primary' : 'btn btn-danger',
                onClick: () => handleUserBanToggle(banModal)
              }, banModal.is_banned ? 'Unban' : 'Ban')
            )
          )
        )
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
