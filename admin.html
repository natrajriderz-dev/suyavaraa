<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustHub Admin - Platform Control</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Icon Components
        const Shield = ({className, style}) => (
            <svg className={className} style={style} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        );

        const Users = ({className, style}) => (
            <svg className={className} style={style} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
        );

        const AlertTriangle = ({className, style}) => (
            <svg className={className} style={style} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        );

        const Flag = ({className, style}) => (
            <svg className={className} style={style} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>
            </svg>
        );

        const TrendingUp = ({className, style}) => (
            <svg className={className} style={style} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
            </svg>
        );

        const Activity = ({className, style}) => (
            <svg className={className} style={style} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
        );

        const User = ({className, style}) => (
            <svg className={className} style={style} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
        );

        const CheckCircle = ({className, style}) => (
            <svg className={className} style={style} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
        );

        const X = ({className, style}) => (
            <svg className={className} style={style} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        );

        const ArrowLeft = ({className, style}) => (
            <svg className={className} style={style} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
        );

        const AdminDashboard = () => {
            const [selectedFlag, setSelectedFlag] = useState(null);
            const [selectedUser, setSelectedUser] = useState(null);

            const adminStats = {
                totalUsers: 45239,
                verificationPending: 127,
                activeFlags: 23,
                todaySignups: 342,
                trustScoreAvg: 8.7
            };

            const aiFlags = [
                {
                    id: 1, user: 'Rahul K.', userId: 'FM_4521', app: 'Forever Us', type: 'Encoded Phone',
                    message: 'User shared: "contact me at ninefivefivethreefourone"', severity: 'high',
                    time: '5 mins ago', action: 'Auto-deleted',
                    details: 'AI detected encoded phone number in chat message. Message automatically deleted and user warned.'
                },
                {
                    id: 2, user: 'Priya M.', userId: 'HM_8934', app: 'Heavenly Matchmaking', type: 'Money Request',
                    message: 'Asked for ₹50,000 for "emergency medical"', severity: 'critical',
                    time: '12 mins ago', action: 'Under Review',
                    details: 'User requested money from match. Pattern matches known scam behavior. Account temporarily restricted.'
                },
                {
                    id: 3, user: 'Arjun S.', userId: 'FM_7623', app: 'Forever Us', type: 'Suspicious Pattern',
                    message: 'Same message sent to 15+ users in 10 minutes', severity: 'medium',
                    time: '1 hour ago', action: 'Warning Issued',
                    details: 'Mass messaging detected. User sent identical message to multiple profiles rapidly.'
                },
                {
                    id: 4, user: 'Sneha P.', userId: 'HM_3421', app: 'Both Apps', type: 'Cross-App Violation',
                    message: 'Different age/details on both platforms', severity: 'high',
                    time: '2 hours ago', action: 'Account Suspended',
                    details: 'Profile inconsistencies detected across platforms. Age differs by 5 years, different profession listed.'
                }
            ];

            const verificationQueue = [
                { name: 'Amit Kumar', type: 'Aadhaar', status: 'pending', app: 'Heavenly Matchmaking', submitted: '10 mins ago', userId: 'HM_5521' },
                { name: 'Neha Singh', type: 'Video', status: 'pending', app: 'Forever Us', submitted: '25 mins ago', userId: 'FM_8832' },
                { name: 'Vikram Rao', type: 'Background', status: 'in_progress', app: 'Heavenly Matchmaking', submitted: '1 hour ago', userId: 'HM_3398' }
            ];

            const recentUsers = [
                {
                    name: 'Anjali Desai', userId: 'HM_8821', app: 'Heavenly Matchmaking',
                    trustScore: 9.4, status: 'active', joined: '2 days ago',
                    verifications: ['Aadhaar', 'Video', 'Background']
                },
                {
                    name: 'Karan Mehta', userId: 'FM_5543', app: 'Forever Us',
                    trustScore: 8.2, status: 'active', joined: '5 days ago',
                    verifications: ['Aadhaar', 'Video']
                },
                {
                    name: 'Shreya Kapoor', userId: 'HM_9987', app: 'Both Apps',
                    trustScore: 9.8, status: 'verified', joined: '1 week ago',
                    verifications: ['Aadhaar', 'Video', 'Background', 'Employment']
                }
            ];

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-50 to-blue-50">
                    {selectedFlag && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl max-w-2xl w-full shadow-2xl">
                                <div className="p-6 border-b flex justify-between items-center">
                                    <h2 className="text-2xl font-bold">Flag Details</h2>
                                    <button onClick={() => setSelectedFlag(null)} className="p-2 hover:bg-gray-100 rounded-lg">
                                        <X style={{width: '24px', height: '24px'}} />
                                    </button>
                                </div>
                                <div className="p-6">
                                    <div className={`border-l-4 rounded-lg p-6 mb-6 ${
                                        selectedFlag.severity === 'critical' ? 'bg-red-50 border-red-500' :
                                        selectedFlag.severity === 'high' ? 'bg-orange-50 border-orange-500' :
                                        'bg-yellow-50 border-yellow-500'
                                    }`}>
                                        <div className="flex items-center gap-3 mb-4">
                                            <span className="text-2xl font-bold">{selectedFlag.user}</span>
                                            <span className="text-gray-600">({selectedFlag.userId})</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 mb-4">
                                            <div>
                                                <p className="text-sm text-gray-600">Platform</p>
                                                <p className="font-semibold">{selectedFlag.app}</p>
                                            </div>
                                            <div>
                                                <p className="text-sm text-gray-600">Type</p>
                                                <p className="font-semibold">{selectedFlag.type}</p>
                                            </div>
                                        </div>
                                        <div className="mb-4">
                                            <p className="text-sm text-gray-600 mb-2">Flagged Message</p>
                                            <p className="font-semibold bg-white p-3 rounded">{selectedFlag.message}</p>
                                        </div>
                                        <div>
                                            <p className="text-sm text-gray-600 mb-2">AI Analysis</p>
                                            <p className="text-gray-700">{selectedFlag.details}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button className="flex-1 bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700">
                                            Approve Action
                                        </button>
                                        <button className="flex-1 bg-red-600 text-white py-3 rounded-lg font-semibold hover:bg-red-700">
                                            Take Further Action
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {selectedUser && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl max-w-2xl w-full shadow-2xl">
                                <div className="p-6 border-b flex justify-between items-center">
                                    <h2 className="text-2xl font-bold">User Profile</h2>
                                    <button onClick={() => setSelectedUser(null)} className="p-2 hover:bg-gray-100 rounded-lg">
                                        <X style={{width: '24px', height: '24px'}} />
                                    </button>
                                </div>
                                <div className="p-6">
                                    <div className="text-center mb-6">
                                        <div className="w-24 h-24 bg-gradient-to-br from-purple-400 to-pink-400 rounded-full mx-auto mb-4 flex items-center justify-center text-4xl text-white font-bold">
                                            {selectedUser.name.charAt(0)}
                                        </div>
                                        <h3 className="text-2xl font-bold mb-1">{selectedUser.name}</h3>
                                        <p className="text-gray-600">{selectedUser.userId}</p>
                                        <div className="flex items-center justify-center gap-2 mt-3">
                                            <Shield style={{width: '20px', height: '20px'}} className="text-purple-600" />
                                            <span className="text-xl font-bold text-purple-600">Trust Score: {selectedUser.trustScore}</span>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 mb-6">
                                        <div className="bg-gray-50 p-4 rounded-lg">
                                            <p className="text-sm text-gray-600">Platform</p>
                                            <p className="font-semibold">{selectedUser.app}</p>
                                        </div>
                                        <div className="bg-gray-50 p-4 rounded-lg">
                                            <p className="text-sm text-gray-600">Status</p>
                                            <p className="font-semibold capitalize">{selectedUser.status}</p>
                                        </div>
                                    </div>
                                    <div className="mb-6">
                                        <h4 className="font-bold mb-3">Completed Verifications</h4>
                                        <div className="flex flex-wrap gap-2">
                                            {selectedUser.verifications.map((v, idx) => (
                                                <span key={idx} className="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-semibold flex items-center gap-1">
                                                    <CheckCircle style={{width: '16px', height: '16px'}} />
                                                    {v}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button className="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">
                                            View Full Profile
                                        </button>
                                        <button className="flex-1 bg-orange-600 text-white py-3 rounded-lg font-semibold hover:bg-orange-700">
                                            Flag Account
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="bg-white shadow-md sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => window.location.href = 'index.html'} className="p-2 hover:bg-gray-100 rounded-lg transition">
                                        <ArrowLeft style={{width: '24px', height: '24px'}} />
                                    </button>
                                    <div className="bg-gradient-to-r from-slate-600 to-slate-800 p-2 rounded-xl">
                                        <Shield style={{width: '24px', height: '24px'}} className="text-white" />
                                    </div>
                                    <div>
                                        <h1 className="text-2xl font-bold text-gray-900">TrustHub Admin</h1>
                                        <p className="text-xs text-gray-600">Real-time Monitoring & Control</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className="px-3 py-1 bg-green-100 text-green-600 rounded-full text-sm font-bold flex items-center gap-1">
                                        <div className="w-2 h-2 bg-green-600 rounded-full animate-pulse"></div>
                                        LIVE
                                    </span>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-4 py-8 space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
                            <div className="bg-white rounded-xl p-6 shadow-lg border-l-4 border-blue-500">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-600 text-sm">Total Users</p>
                                        <p className="text-3xl font-bold text-gray-900">{adminStats.totalUsers.toLocaleString()}</p>
                                    </div>
                                    <Users style={{width: '40px', height: '40px'}} className="text-blue-500" />
                                </div>
                            </div>
                            <div className="bg-white rounded-xl p-6 shadow-lg border-l-4 border-orange-500">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-600 text-sm">Pending Verifications</p>
                                        <p className="text-3xl font-bold text-gray-900">{adminStats.verificationPending}</p>
                                    </div>
                                    <AlertTriangle style={{width: '40px', height: '40px'}} className="text-orange-500" />
                                </div>
                            </div>
                            <div className="bg-white rounded-xl p-6 shadow-lg border-l-4 border-red-500">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-600 text-sm">Active Flags</p>
                                        <p className="text-3xl font-bold text-gray-900">{adminStats.activeFlags}</p>
                                    </div>
                                    <Flag style={{width: '40px', height: '40px'}} className="text-red-500" />
                                </div>
                            </div>
                            <div className="bg-white rounded-xl p-6 shadow-lg border-l-4 border-green-500">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-600 text-sm">Today's Signups</p>
                                        <p className="text-3xl font-bold text-gray-900">{adminStats.todaySignups}</p>
                                    </div>
                                    <TrendingUp style={{width: '40px', height: '40px'}} className="text-green-500" />
                                </div>
                            </div>
                            <div className="bg-white rounded-xl p-6 shadow-lg border-l-4 border-purple-500">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-600 text-sm">Avg Trust Score</p>
                                        <p className="text-3xl font-bold text-gray-900">{adminStats.trustScoreAvg}</p>
                                    </div>
                                    <Shield style={{width: '40px', height: '40px'}} className="text-purple-500" />
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-lg p-6">
                            <div className="flex items-center gap-3 mb-6">
                                <Activity style={{width: '24px', height: '24px'}} className="text-red-500" />
                                <h2 className="text-2xl font-bold text-gray-900">AI Detection - Live Flags</h2>
                                <span className="px-3 py-1 bg-red-100 text-red-600 rounded-full text-sm font-bold">LIVE</span>
                            </div>

                            <div className="space-y-4">
                                {aiFlags.map(flag => (
                                    <div key={flag.id} className={`border-l-4 rounded-lg p-4 cursor-pointer hover:shadow-md transition ${
                                        flag.severity === 'critical' ? 'bg-red-50 border-red-500' :
                                        flag.severity === 'high' ? 'bg-orange-50 border-orange-500' :
                                        'bg-yellow-50 border-yellow-500'
                                    }`}>
                                        <div className="flex items-start justify-between">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-3 mb-2 flex-wrap">
                                                    <span className="font-bold text-gray-900">{flag.user}</span>
                                                    <span className="text-sm text-gray-600">({flag.userId})</span>
                                                    <span className={`px-2 py-1 rounded-full text-xs font-bold ${
                                                        flag.app === 'Both Apps' ? 'bg-purple-100 text-purple-700' :
                                                        flag.app === 'Forever Us' ? 'bg-pink-100 text-pink-700' :
                                                        'bg-blue-100 text-blue-700'
                                                    }`}>
                                                        {flag.app}
                                                    </span>
                                                    <span className={`px-2 py-1 rounded-full text-xs font-bold ${
                                                        flag.severity === 'critical' ? 'bg-red-100 text-red-700' :
                                                        flag.severity === 'high' ? 'bg-orange-100 text-orange-700' :
                                                        'bg-yellow-100 text-yellow-700'
                                                    }`}>
                                                        {flag.type}
                                                    </span>
                                                </div>
                                                <p className="text-gray-700 mb-2">{flag.message}</p>
                                                <div className="flex items-center gap-4 text-sm">
                                                    <span className="text-gray-500">⏰ {flag.time}</span>
                                                    <span className={`font-semibold ${
                                                        flag.action === 'Auto-deleted' || flag.action === 'Account Banned' ? 'text-green-600' :
                                                        flag.action === 'Account Suspended' ? 'text-red-600' :
                                                        'text-orange-600'
                                                    }`}>
                                                        ✓ {flag.action}
                                                    </span>
                                                </div>
                                            </div>
                                            <button onClick={() => setSelectedFlag(flag)} className="px-4 py-2 bg-gray-800 text-white rounded-lg font-semibold hover:bg-gray-900 transition">
                                                Review
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <h2 className="text-2xl font-bold text-gray-900 mb-6">Verification Queue</h2>
                                <div className="space-y-3">
                                    {verificationQueue.map((item, idx) => (
                                        <div key={idx} className="flex items-center justify-between p-4 bg-gray-50 rounded-lg hover:bg-gray-100 transition">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                                                    <User style={{width: '24px', height: '24px'}} className="text-blue-600" />
                                                </div>
                                                <div>
                                                    <p className="font-semibold text-gray-900">{item.name}</p>
                                                    <p className="text-sm text-gray-600">{item.app}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className="px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-sm font-semibold">
                                                    {item.type}
                                                </span>
                                                <button className="px-4 py-2 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700">
                                                    Process
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <h2 className="text-2xl font-bold text-gray-900 mb-6">Recent Users</h2>
                                <div className="space-y-3">
                                    {recentUsers.map((user, idx) => (
                                        <div key={idx} className="p-4 bg-gray-50 rounded-lg hover:bg-gray-100 transition cursor-pointer" onClick={() => setSelectedUser(user)}>
                                            <div className="flex items-center justify-between mb-3">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 bg-gradient-to-br from-purple-400 to-pink-400 rounded-full flex items-center justify-center text-white font-bold">
                                                        {user.name.charAt(0)}
                                                    </div>
                                                    <div>
                                                        <p className="font-semibold text-gray-900">{user.name}</p>
                                                        <p className="text-xs text-gray-600">{user.userId}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <Shield style={{width: '16px', height: '16px'}} className="text-purple-600" />
                                                    <span className="font-bold text-purple-600">{user.trustScore}</span>
                                                </div>
                                            </div>
                                            <div className="flex items-center justify-between text-sm">
                                                <span className="text-gray-600">{user.app}</span>
                                                <span className="text-gray-500">{user.joined}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<AdminDashboard />, document.getElementById('root'));
    </script>
</body>
</html>
