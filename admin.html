<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suyavaraa Admin Safety Console</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    const SUPABASE_URL = window.__SUYAVARAA_SUPABASE_URL__ || 'https://mocbhyhccwwbczcqcdwb.supabase.co';
    const SUPABASE_ANON_KEY = window.__SUYAVARAA_SUPABASE_ANON_KEY__
      || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vY2JoeWhjY3d3YmN6Y3FjZHdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Nzc1OTgsImV4cCI6MjA4NzM1MzU5OH0.Xzo9Yv29oTdjWyqnfedQAfh4vUYxSOVKLF5cKjsYZuk';

    const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const fmtTime = (iso) => {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleString();
    };

    const badge = (text, cls) => (
      <span className={`px-2 py-1 rounded text-xs font-semibold ${cls}`}>{text}</span>
    );

    const severityBadgeClass = (s) => {
      if (s === 'critical') return 'bg-red-100 text-red-700';
      if (s === 'high') return 'bg-orange-100 text-orange-700';
      if (s === 'medium') return 'bg-yellow-100 text-yellow-800';
      return 'bg-slate-100 text-slate-700';
    };

    const categoryBadgeClass = (c) => {
      if (c === 'sexual_content') return 'bg-pink-100 text-pink-700';
      if (c === 'harassment') return 'bg-orange-100 text-orange-700';
      if (c === 'deepfake') return 'bg-purple-100 text-purple-700';
      if (c === 'spam') return 'bg-blue-100 text-blue-700';
      if (c === 'scam') return 'bg-red-100 text-red-700';
      return 'bg-slate-100 text-slate-700';
    };

    const AiAdminBotCard = ({ reports, deepfakeScans, feedback }) => {
      const summary = useMemo(() => {
        const pendingReports = reports.filter(r => r.status === 'pending');
        const critical = pendingReports.filter(r => r.severity === 'critical').length;
        const sexual = pendingReports.filter(r => r.category === 'sexual_content').length;
        const harassment = pendingReports.filter(r => r.category === 'harassment').length;
        const deepfake = pendingReports.filter(r => r.category === 'deepfake').length;
        const openFeedback = feedback.filter(f => f.status === 'open').length;
        const suspiciousScans = deepfakeScans.filter(s => ['deepfake', 'nsfw', 'suspicious'].includes(s.result)).length;

        const nextAction =
          critical > 0
            ? 'Prioritize critical reports immediately.'
            : suspiciousScans > 0
              ? 'Review suspicious deepfake/NSFW scans.'
              : openFeedback > 10
                ? 'Triage user feedback backlog.'
                : 'No urgent AI safety escalation right now.';

        return { critical, sexual, harassment, deepfake, openFeedback, suspiciousScans, nextAction };
      }, [reports, deepfakeScans, feedback]);

      return (
        <div className="bg-white rounded-xl shadow p-6">
          <h2 className="text-xl font-bold mb-3">Admin Report AI Bot</h2>
          <p className="text-sm text-slate-600 mb-4">
            Live AI triage summary generated from reports, deepfake scans, and feedback queues.
          </p>
          <div className="grid grid-cols-2 md:grid-cols-6 gap-3 mb-4">
            <div className="bg-red-50 p-3 rounded"><div className="text-xs text-slate-500">Critical</div><div className="text-2xl font-bold text-red-700">{summary.critical}</div></div>
            <div className="bg-pink-50 p-3 rounded"><div className="text-xs text-slate-500">Sexual</div><div className="text-2xl font-bold text-pink-700">{summary.sexual}</div></div>
            <div className="bg-orange-50 p-3 rounded"><div className="text-xs text-slate-500">Harassment</div><div className="text-2xl font-bold text-orange-700">{summary.harassment}</div></div>
            <div className="bg-purple-50 p-3 rounded"><div className="text-xs text-slate-500">Deepfake</div><div className="text-2xl font-bold text-purple-700">{summary.deepfake}</div></div>
            <div className="bg-blue-50 p-3 rounded"><div className="text-xs text-slate-500">Suspicious Scans</div><div className="text-2xl font-bold text-blue-700">{summary.suspiciousScans}</div></div>
            <div className="bg-slate-100 p-3 rounded"><div className="text-xs text-slate-500">Open Feedback</div><div className="text-2xl font-bold text-slate-700">{summary.openFeedback}</div></div>
          </div>
          <div className="bg-slate-50 border border-slate-200 rounded p-4">
            <div className="text-xs text-slate-500 mb-1">Recommended action</div>
            <div className="text-sm font-semibold text-slate-800">{summary.nextAction}</div>
          </div>
        </div>
      );
    };

    const AdminDashboard = ({ adminUser, onLogout }) => {
      const [loading, setLoading] = useState(true);
      const [refreshing, setRefreshing] = useState(false);
      const [users, setUsers] = useState([]);
      const [reports, setReports] = useState([]);
      const [feedback, setFeedback] = useState([]);
      const [blocks, setBlocks] = useState([]);
      const [deepfakeScans, setDeepfakeScans] = useState([]);
      const [autoRemovals, setAutoRemovals] = useState([]);
      const [verificationQueue, setVerificationQueue] = useState([]);
      const [message, setMessage] = useState('');

      const loadData = useCallback(async () => {
        setRefreshing(true);
        try {
          const [
            { data: usersData },
            { data: reportsData },
            { data: feedbackData },
            { data: blocksData },
            { data: scansData },
            { data: removalsData },
            { data: vqData },
          ] = await Promise.all([
            supa.from('users').select('id, full_name, email, is_banned, ban_reason, ban_expires_at, trust_score, is_verified, created_at').order('created_at', { ascending: false }).limit(30),
            supa.from('reports').select('id, reporter_id, target_id, content_type, reason, category, severity, auto_flagged, status, created_at, ai_analysis').order('created_at', { ascending: false }).limit(80),
            supa.from('user_feedback').select('id, user_id, category, subject, message, rating, status, admin_reply, created_at').order('created_at', { ascending: false }).limit(50),
            supa.from('user_blocks').select('id, blocker_id, blocked_id, reason, created_at').order('created_at', { ascending: false }).limit(80),
            supa.from('deepfake_scans').select('id, user_id, image_url, scan_type, result, confidence_score, ai_reasoning, action_taken, scanned_at').order('scanned_at', { ascending: false }).limit(80),
            supa.from('content_auto_removals').select('id, user_id, content_type, content_id, content_preview, removal_reason, category, ai_confidence, removed_at').order('removed_at', { ascending: false }).limit(80),
            supa.from('verification_requests').select('id, user_id, status, media_url, created_at').eq('status', 'pending').order('created_at', { ascending: true }).limit(20),
          ]);

          setUsers(usersData || []);
          setReports(reportsData || []);
          setFeedback(feedbackData || []);
          setBlocks(blocksData || []);
          setDeepfakeScans(scansData || []);
          setAutoRemovals(removalsData || []);
          setVerificationQueue(vqData || []);
        } catch (err) {
          console.error('Load admin data error:', err);
          setMessage('Error loading admin data');
        } finally {
          setLoading(false);
          setRefreshing(false);
        }
      }, []);

      useEffect(() => {
        loadData();
        const id = setInterval(loadData, 30000);
        return () => clearInterval(id);
      }, [loadData]);

      const resolveReport = async (id, status) => {
        const { error } = await supa.from('reports').update({
          status,
          resolved_at: new Date().toISOString(),
          resolved_by: adminUser.id,
        }).eq('id', id);

        if (!error) {
          setMessage(`Report ${status}`);
          loadData();
        } else {
          setMessage(error.message);
        }
      };

      const processVerification = async (row, approved) => {
        const status = approved ? 'approved' : 'rejected';
        const { error } = await supa.from('verification_requests').update({
          status,
          reviewed_at: new Date().toISOString(),
          reviewed_by: adminUser.id,
        }).eq('id', row.id);

        if (!error && approved) {
          await supa.from('users').update({ is_verified: true, trust_level: 'green_verified' }).eq('id', row.user_id);
        }

        if (!error) {
          setMessage(`Verification ${status}`);
          loadData();
        }
      };

      const banUser = async (userId) => {
        const reason = window.prompt('Ban reason (required):', 'policy violation');
        if (!reason) return;

        const { error } = await supa.from('users').update({
          is_banned: true,
          ban_reason: reason,
        }).eq('id', userId);

        if (!error) {
          await supa.from('admin_activity_log').insert({
            admin_id: adminUser.id,
            action: 'ban_user',
            target_type: 'user',
            target_id: userId,
            details: { reason }
          });

          setMessage('User banned');
          loadData();
        } else {
          setMessage(error.message);
        }
      };

      const unbanUser = async (userId) => {
        const { error } = await supa.from('users').update({
          is_banned: false,
          ban_reason: null,
          ban_expires_at: null,
        }).eq('id', userId);

        if (!error) {
          await supa.from('admin_activity_log').insert({
            admin_id: adminUser.id,
            action: 'unban_user',
            target_type: 'user',
            target_id: userId,
            details: {}
          });
          setMessage('User unbanned');
          loadData();
        } else {
          setMessage(error.message);
        }
      };

      const closeFeedback = async (id) => {
        const reply = window.prompt('Optional admin reply:', 'Reviewed. Thanks for reporting this.');
        const { error } = await supa.from('user_feedback').update({
          status: 'closed',
          admin_reply: reply || null,
          admin_id: adminUser.id,
        }).eq('id', id);

        if (!error) {
          setMessage('Feedback closed');
          loadData();
        }
      };

      if (loading) {
        return <div className="min-h-screen flex items-center justify-center text-slate-700">Loading admin console...</div>;
      }

      const pendingReports = reports.filter(r => r.status === 'pending');
      const spamReports = reports.filter(r => r.category === 'spam');
      const sexualReports = reports.filter(r => r.category === 'sexual_content');
      const harassmentReports = reports.filter(r => r.category === 'harassment');
      const deepfakeReports = reports.filter(r => r.category === 'deepfake');
      const bannedUsers = users.filter(u => u.is_banned);

      return (
        <div className="min-h-screen bg-slate-100">
          <header className="bg-white border-b sticky top-0 z-20">
            <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-4">
              <div>
                <h1 className="text-2xl font-bold text-slate-900">Suyavaraa Admin Safety Console</h1>
                <p className="text-sm text-slate-500">Live trust, safety, feedback, blocks, AI scans and moderation actions.</p>
              </div>
              <div className="flex items-center gap-2">
                {message ? <span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">{message}</span> : null}
                <button onClick={loadData} className="px-3 py-2 rounded bg-slate-800 text-white text-sm">{refreshing ? 'Refreshing...' : 'Refresh'}</button>
                <button onClick={onLogout} className="px-3 py-2 rounded bg-slate-200 text-slate-800 text-sm">Logout</button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto p-4 space-y-6">
            <div className="grid grid-cols-2 md:grid-cols-6 gap-3">
              <div className="bg-white rounded p-4"><div className="text-xs text-slate-500">Total Users</div><div className="text-2xl font-bold">{users.length}</div></div>
              <div className="bg-white rounded p-4"><div className="text-xs text-slate-500">Pending Reports</div><div className="text-2xl font-bold text-red-700">{pendingReports.length}</div></div>
              <div className="bg-white rounded p-4"><div className="text-xs text-slate-500">Spam Reports</div><div className="text-2xl font-bold text-blue-700">{spamReports.length}</div></div>
              <div className="bg-white rounded p-4"><div className="text-xs text-slate-500">Sexual Reports</div><div className="text-2xl font-bold text-pink-700">{sexualReports.length}</div></div>
              <div className="bg-white rounded p-4"><div className="text-xs text-slate-500">Harassment</div><div className="text-2xl font-bold text-orange-700">{harassmentReports.length}</div></div>
              <div className="bg-white rounded p-4"><div className="text-xs text-slate-500">Deepfake</div><div className="text-2xl font-bold text-purple-700">{deepfakeReports.length}</div></div>
            </div>

            <AiAdminBotCard reports={reports} deepfakeScans={deepfakeScans} feedback={feedback} />

            <section className="bg-white rounded-xl shadow p-4">
              <h2 className="text-lg font-bold mb-3">Reports Queue (Spam, Harassment, Sexual, Deepfake)</h2>
              <div className="overflow-auto">
                <table className="w-full text-sm">
                  <thead className="text-left bg-slate-50">
                    <tr>
                      <th className="p-2">Time</th>
                      <th className="p-2">Type</th>
                      <th className="p-2">Category</th>
                      <th className="p-2">Severity</th>
                      <th className="p-2">Reason</th>
                      <th className="p-2">Status</th>
                      <th className="p-2">Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    {reports.map(r => (
                      <tr key={r.id} className="border-b align-top">
                        <td className="p-2 whitespace-nowrap">{fmtTime(r.created_at)}</td>
                        <td className="p-2">{r.content_type}</td>
                        <td className="p-2">{badge(r.category || 'general', categoryBadgeClass(r.category))}</td>
                        <td className="p-2">{badge(r.severity || 'medium', severityBadgeClass(r.severity))}</td>
                        <td className="p-2 max-w-sm">{r.reason} {r.auto_flagged ? badge('auto', 'bg-slate-800 text-white ml-2') : null}</td>
                        <td className="p-2">{r.status}</td>
                        <td className="p-2 space-x-2">
                          {r.status === 'pending' ? (
                            <>
                              <button onClick={() => resolveReport(r.id, 'resolved')} className="px-2 py-1 bg-green-600 text-white rounded">Resolve</button>
                              <button onClick={() => resolveReport(r.id, 'dismissed')} className="px-2 py-1 bg-red-600 text-white rounded">Dismiss</button>
                            </>
                          ) : <span className="text-slate-500">—</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </section>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <section className="bg-white rounded-xl shadow p-4">
                <h2 className="text-lg font-bold mb-3">Blocked Users (who blocked whom + reason)</h2>
                <div className="space-y-2">
                  {blocks.length === 0 ? <p className="text-slate-500 text-sm">No blocks recorded.</p> : null}
                  {blocks.map(b => (
                    <div key={b.id} className="p-3 bg-slate-50 rounded border text-sm">
                      <div><span className="font-semibold">Blocker:</span> {b.blocker_id}</div>
                      <div><span className="font-semibold">Blocked:</span> {b.blocked_id}</div>
                      <div><span className="font-semibold">Reason:</span> {b.reason || '—'}</div>
                      <div className="text-xs text-slate-500 mt-1">{fmtTime(b.created_at)}</div>
                    </div>
                  ))}
                </div>
              </section>

              <section className="bg-white rounded-xl shadow p-4">
                <h2 className="text-lg font-bold mb-3">User Feedback</h2>
                <div className="space-y-2">
                  {feedback.length === 0 ? <p className="text-slate-500 text-sm">No feedback yet.</p> : null}
                  {feedback.map(f => (
                    <div key={f.id} className="p-3 bg-slate-50 rounded border text-sm">
                      <div className="flex items-center justify-between">
                        <div className="font-semibold">{f.subject}</div>
                        <div>{badge(f.status, f.status === 'open' ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700')}</div>
                      </div>
                      <div className="text-xs text-slate-500 mb-1">{f.category} • user: {f.user_id}</div>
                      <div className="mb-2">{f.message}</div>
                      {f.status === 'open' ? (
                        <button onClick={() => closeFeedback(f.id)} className="px-2 py-1 bg-slate-800 text-white rounded text-xs">Close</button>
                      ) : (
                        <div className="text-xs text-slate-600">Admin reply: {f.admin_reply || '—'}</div>
                      )}
                    </div>
                  ))}
                </div>
              </section>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <section className="bg-white rounded-xl shadow p-4">
                <h2 className="text-lg font-bold mb-3">Deepfake / NSFW Detection Logs</h2>
                <div className="space-y-2 max-h-[420px] overflow-auto">
                  {deepfakeScans.length === 0 ? <p className="text-slate-500 text-sm">No scan data.</p> : null}
                  {deepfakeScans.map(s => (
                    <div key={s.id} className="p-3 bg-slate-50 rounded border text-sm">
                      <div className="flex items-center justify-between">
                        <div className="font-semibold">{s.scan_type}</div>
                        <div>{badge(s.result, categoryBadgeClass(s.result === 'nsfw' ? 'sexual_content' : s.result))}</div>
                      </div>
                      <div className="text-xs text-slate-500">user: {s.user_id}</div>
                      <div>confidence: {s.confidence_score ?? '—'}</div>
                      <div className="text-xs mt-1">{s.ai_reasoning || '—'}</div>
                      <div className="text-xs text-slate-500 mt-1">{fmtTime(s.scanned_at)}</div>
                    </div>
                  ))}
                </div>
              </section>

              <section className="bg-white rounded-xl shadow p-4">
                <h2 className="text-lg font-bold mb-3">Sexual Post Auto-Removals</h2>
                <div className="space-y-2 max-h-[420px] overflow-auto">
                  {autoRemovals.length === 0 ? <p className="text-slate-500 text-sm">No auto removals yet.</p> : null}
                  {autoRemovals.map(r => (
                    <div key={r.id} className="p-3 bg-slate-50 rounded border text-sm">
                      <div className="flex items-center justify-between">
                        <div className="font-semibold">{r.content_type}</div>
                        <div>{badge(r.category || 'general', categoryBadgeClass(r.category))}</div>
                      </div>
                      <div className="text-xs text-slate-500">user: {r.user_id}</div>
                      <div className="mt-1">reason: {r.removal_reason}</div>
                      <div className="text-xs mt-1">confidence: {r.ai_confidence ?? '—'}</div>
                      <div className="text-xs text-slate-500 mt-1">{fmtTime(r.removed_at)}</div>
                    </div>
                  ))}
                </div>
              </section>
            </div>

            <section className="bg-white rounded-xl shadow p-4">
              <h2 className="text-lg font-bold mb-3">User Management (ban reason + unban)</h2>
              <div className="space-y-2">
                {users.map(u => (
                  <div key={u.id} className="p-3 bg-slate-50 rounded border text-sm flex items-start justify-between gap-3">
                    <div>
                      <div className="font-semibold">{u.full_name || u.email || u.id}</div>
                      <div className="text-xs text-slate-500">{u.id}</div>
                      <div className="text-xs mt-1">Trust: {u.trust_score ?? '—'} • Verified: {u.is_verified ? 'Yes' : 'No'}</div>
                      <div className="text-xs mt-1">Banned: {u.is_banned ? 'Yes' : 'No'} {u.ban_reason ? `• reason: ${u.ban_reason}` : ''}</div>
                      <div className="text-xs text-slate-500 mt-1">Joined: {fmtTime(u.created_at)}</div>
                    </div>
                    <div className="space-x-2 whitespace-nowrap">
                      {u.is_banned ? (
                        <button onClick={() => unbanUser(u.id)} className="px-2 py-1 bg-green-600 text-white rounded">Unban</button>
                      ) : (
                        <button onClick={() => banUser(u.id)} className="px-2 py-1 bg-red-600 text-white rounded">Ban</button>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </section>

            <section className="bg-white rounded-xl shadow p-4">
              <h2 className="text-lg font-bold mb-3">Verification Queue</h2>
              <div className="space-y-2">
                {verificationQueue.length === 0 ? <p className="text-slate-500 text-sm">No pending verification requests.</p> : null}
                {verificationQueue.map(v => (
                  <div key={v.id} className="p-3 bg-slate-50 rounded border text-sm flex items-center justify-between gap-3">
                    <div>
                      <div className="font-semibold">User: {v.user_id}</div>
                      <div className="text-xs text-slate-500">{fmtTime(v.created_at)}</div>
                      {v.media_url ? <a className="text-blue-600 underline text-xs" target="_blank" rel="noreferrer" href={v.media_url}>Open proof</a> : null}
                    </div>
                    <div className="space-x-2">
                      <button onClick={() => processVerification(v, true)} className="px-2 py-1 bg-green-600 text-white rounded">Approve</button>
                      <button onClick={() => processVerification(v, false)} className="px-2 py-1 bg-red-600 text-white rounded">Reject</button>
                    </div>
                  </div>
                ))}
              </div>
            </section>

            <section className="bg-white rounded-xl shadow p-4">
              <h2 className="text-lg font-bold mb-2">Banned Users Snapshot</h2>
              <p className="text-sm text-slate-500 mb-3">Includes ban reason and who is currently restricted.</p>
              <div className="space-y-2">
                {bannedUsers.length === 0 ? <p className="text-slate-500 text-sm">No banned users right now.</p> : null}
                {bannedUsers.map(u => (
                  <div key={u.id} className="p-3 bg-red-50 border border-red-200 rounded text-sm">
                    <div className="font-semibold text-red-800">{u.full_name || u.email || u.id}</div>
                    <div className="text-xs text-red-700">Reason: {u.ban_reason || 'Not provided'}</div>
                    <div className="text-xs text-red-600 mt-1">Since: {fmtTime(u.created_at)}</div>
                  </div>
                ))}
              </div>
            </section>
          </main>
        </div>
      );
    };

    const App = () => {
      const [authed, setAuthed] = useState(false);
      const [adminUser, setAdminUser] = useState(null);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const login = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        try {
          const { data, error: authError } = await supa.auth.signInWithPassword({ email, password });
          if (authError) throw authError;

          const { data: adminRow, error: adminErr } = await supa
            .from('admin_users')
            .select('role')
            .eq('user_id', data.user.id)
            .single();

          if (adminErr || !adminRow) {
            await supa.auth.signOut();
            throw new Error('Access denied. Not in admin_users table.');
          }

          setAuthed(true);
          setAdminUser(data.user);
        } catch (err) {
          setError(err.message || 'Login failed');
        } finally {
          setLoading(false);
        }
      };

      const logout = async () => {
        await supa.auth.signOut();
        setAuthed(false);
        setAdminUser(null);
      };

      if (authed) return <AdminDashboard adminUser={adminUser} onLogout={logout} />;

      return (
        <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
          <form onSubmit={login} className="bg-white rounded-xl shadow-xl p-8 w-full max-w-md space-y-4">
            <h1 className="text-2xl font-bold text-slate-900">Admin Login</h1>
            <p className="text-sm text-slate-500">Safety console access is restricted to admin_users.</p>
            {error ? <div className="text-sm bg-red-50 border border-red-200 text-red-700 p-2 rounded">{error}</div> : null}
            <div>
              <label className="text-sm font-medium text-slate-700 block mb-1">Email</label>
              <input className="w-full border rounded px-3 py-2" type="email" value={email} onChange={(e) => setEmail(e.target.value)} required />
            </div>
            <div>
              <label className="text-sm font-medium text-slate-700 block mb-1">Password</label>
              <input className="w-full border rounded px-3 py-2" type="password" value={password} onChange={(e) => setPassword(e.target.value)} required />
            </div>
            <button className="w-full bg-slate-800 text-white py-2 rounded" type="submit" disabled={loading}>{loading ? 'Signing in...' : 'Sign in'}</button>
          </form>
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
