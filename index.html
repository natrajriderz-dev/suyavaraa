<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustHub | AI Safety Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        // We use a simple SVG-based icon component since we are in a single HTML file
        const Icon = ({ name, className = "w-5 h-5" }) => {
            React.useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const TrustHubDemo = () => {
            const [activeView, setActiveView] = React.useState('admin');
            const [showAlert, setShowAlert] = React.useState(false);

            // Admin Data
            const adminStats = [
                { label: 'Total Users', val: '45,239', color: 'blue' },
                { label: 'Flags', val: '23', color: 'red' },
                { label: 'Trust Score', val: '8.7', color: 'purple' }
            ];

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="bg-white border-b sticky top-0 z-50 p-4">
                        <div className="max-w-5xl mx-auto flex flex-col items-center gap-4">
                            <div className="flex items-center gap-2">
                                <div className="bg-indigo-600 p-2 rounded-lg text-white">
                                    <Icon name="shield" />
                                </div>
                                <h1 className="text-xl font-bold">TrustHub Platform</h1>
                            </div>
                            
                            <div className="flex bg-gray-100 p-1 rounded-xl w-full max-w-md">
                                {['admin', 'matrimony', 'dating'].map((view) => (
                                    <button 
                                        key={view}
                                        onClick={() => setActiveView(view)}
                                        className={`flex-1 py-2 rounded-lg text-xs font-bold uppercase transition ${activeView === view ? 'bg-white shadow-sm text-indigo-600' : 'text-gray-500'}`}
                                    >
                                        {view}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="max-w-5xl mx-auto p-6">
                        {activeView === 'admin' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-3 gap-4">
                                    {adminStats.map((s, i) => (
                                        <div key={i} className={`bg-white p-4 rounded-xl shadow-sm border-l-4 border-${s.color}-500`}>
                                            <p className="text-[10px] uppercase font-bold text-gray-400">{s.label}</p>
                                            <p className="text-xl font-bold">{s.val}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <h2 className="font-bold mb-4 flex items-center gap-2 text-red-500">
                                        <Icon name="activity" /> AI Live Flags
                                    </h2>
                                    <div className="space-y-3">
                                        <div className="p-3 bg-red-50 rounded-lg border border-red-100 text-sm">
                                            <p className="font-bold">Rahul K. (Forever Us)</p>
                                            <p className="text-gray-600">Attempted to share encoded phone number.</p>
                                            <p className="text-green-600 font-bold mt-1">✓ Auto-deleted</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeView !== 'admin' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {[1, 2].map((i) => (
                                    <div key={i} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                        <div className="h-32 bg-indigo-50 flex items-center justify-center text-5xl">
                                            {activeView === 'matrimony' ? '👨‍💼' : '💃'}
                                        </div>
                                        <div className="p-5">
                                            <div className="flex justify-between items-center mb-4">
                                                <h3 className="font-bold">Verified User {i}</h3>
                                                <span className="bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] font-bold">TRUST: 9.2</span>
                                            </div>
                                            <button 
                                                onClick={() => setShowAlert(true)}
                                                className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold"
                                            >
                                                Secure Connect
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Alert Modal */}
                    {showAlert && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[100]">
                            <div className="bg-white p-8 rounded-3xl max-w-xs w-full text-center">
                                <Icon name="check-circle" className="w-12 h-12 text-green-500 mx-auto mb-4" />
                                <h2 className="text-xl font-bold mb-2">Request Sent!</h2>
                                <p className="text-sm text-gray-500 mb-6">TrustHub AI is verifying the link.</p>
                                <button onClick={() => setShowAlert(false)} className="w-full bg-gray-900 text-white py-3 rounded-xl font-bold">Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TrustHubDemo />);
    </script>
</body>
</html>
