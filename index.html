<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustHub Platform - Where Love Meets Trust</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Lucide Icons as SVG components
        const Shield = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        );

        const Heart = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
        );

        const Users = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
        );

        const CheckCircle = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
        );

        const Lock = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        );

        const Star = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
        );

        const Zap = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
        );

        const Award = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="8" r="7"/>
                <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
            </svg>
        );

        const ArrowRight = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
            </svg>
        );

        const Sparkles = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                <path d="M5 3v4"/>
                <path d="M19 17v4"/>
                <path d="M3 5h4"/>
                <path d="M17 19h4"/>
            </svg>
        );

        const TrustHubLanding = () => {
            const [hoveredCard, setHoveredCard] = useState(null);
            const [statsAnimation, setStatsAnimation] = useState(false);

            useEffect(() => {
                setStatsAnimation(true);
            }, []);

            const stats = [
                { value: '50,000+', label: 'Verified Users', icon: Users },
                { value: '95%', label: 'Trust Score', icon: Star },
                { value: '24/7', label: 'AI Monitoring', icon: Shield },
                { value: '10,000+', label: 'Successful Matches', icon: Heart }
            ];

            const dashboards = [
                {
                    id: 'admin',
                    title: 'TrustHub Admin',
                    subtitle: 'Complete Platform Control',
                    description: 'Monitor AI detection, manage verifications, and ensure user safety across both platforms',
                    icon: Shield,
                    color: 'from-slate-600 to-slate-800',
                    features: ['Live AI Flags', 'User Verification', 'Trust Scores', 'Analytics'],
                    link: 'admin.html'
                },
                {
                    id: 'matrimony',
                    title: 'Heavenly Matchmaking',
                    subtitle: 'Traditional. Trusted. Forever.',
                    description: 'Serious profiles with background verification for finding your perfect life partner',
                    icon: Heart,
                    color: 'from-purple-600 to-pink-600',
                    features: ['Background Checks', 'Family Details', 'Admin Mediation', 'Verified Profiles'],
                    link: 'matrimony.html'
                },
                {
                    id: 'dating',
                    title: 'Forever Us',
                    subtitle: 'Modern. Safe. Exciting.',
                    description: 'Connect and chat with verified profiles in a secure, AI-monitored environment',
                    icon: Sparkles,
                    color: 'from-pink-500 to-rose-500',
                    features: ['Instant Chat', 'Interest Matching', 'Online Status', 'Real-time Safety'],
                    link: 'dating.html'
                }
            ];

            return (
                <div className="min-h-screen bg-gradient-to-br from-purple-50 via-pink-50 to-rose-50">
                    <div className="fixed inset-0 overflow-hidden pointer-events-none">
                        <div className="absolute top-20 left-10 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-pulse"></div>
                        <div className="absolute top-40 right-10 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-pulse" style={{animationDelay: '1s'}}></div>
                        <div className="absolute bottom-20 left-1/2 w-72 h-72 bg-rose-300 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-pulse" style={{animationDelay: '2s'}}></div>
                    </div>

                    <div className="relative z-10">
                        <div className="max-w-7xl mx-auto px-4 pt-16 pb-12">
                            <div className="text-center mb-16">
                                <div className="flex items-center justify-center gap-4 mb-6">
                                    <div className="relative">
                                        <div className="absolute inset-0 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl blur-lg opacity-50"></div>
                                        <div className="relative bg-gradient-to-r from-purple-600 to-pink-600 p-4 rounded-2xl">
                                            <Shield className="w-12 h-12 text-white" style={{width: '48px', height: '48px'}} />
                                        </div>
                                    </div>
                                    <Heart className="w-8 h-8 text-pink-500 animate-pulse" style={{width: '32px', height: '32px'}} />
                                </div>

                                <h1 className="text-6xl md:text-7xl font-bold mb-6 bg-gradient-to-r from-purple-600 via-pink-600 to-rose-600 bg-clip-text text-transparent">
                                    TrustHub Platform
                                </h1>
                                
                                <p className="text-2xl md:text-3xl text-gray-700 mb-4 font-semibold">
                                    Where Love Meets Trust 💕
                                </p>
                                
                                <p className="text-lg text-gray-600 max-w-3xl mx-auto mb-8">
                                    AI-powered safety and verification for meaningful connections. Building trust in every relationship, from the first hello to forever.
                                </p>

                                <div className="flex flex-wrap items-center justify-center gap-4 mb-12">
                                    <div className="flex items-center gap-2 bg-white px-6 py-3 rounded-full shadow-lg">
                                        <Lock className="w-5 h-5 text-green-600" style={{width: '20px', height: '20px'}} />
                                        <span className="font-semibold text-gray-700">Bank-Grade Security</span>
                                    </div>
                                    <div className="flex items-center gap-2 bg-white px-6 py-3 rounded-full shadow-lg">
                                        <Zap className="w-5 h-5 text-yellow-600" style={{width: '20px', height: '20px'}} />
                                        <span className="font-semibold text-gray-700">Real-time AI Detection</span>
                                    </div>
                                    <div className="flex items-center gap-2 bg-white px-6 py-3 rounded-full shadow-lg">
                                        <Award className="w-5 h-5 text-purple-600" style={{width: '20px', height: '20px'}} />
                                        <span className="font-semibold text-gray-700">100% Verified Profiles</span>
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mb-16">
                                {stats.map((stat, idx) => {
                                    const Icon = stat.icon;
                                    return (
                                        <div 
                                            key={idx}
                                            className={`bg-white rounded-2xl p-6 shadow-xl text-center transform transition-all duration-700 ${
                                                statsAnimation ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'
                                            }`}
                                            style={{transitionDelay: `${idx * 100}ms`}}
                                        >
                                            <Icon className="w-10 h-10 mx-auto mb-3 text-purple-600" style={{width: '40px', height: '40px'}} />
                                            <div className="text-4xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent mb-2">
                                                {stat.value}
                                            </div>
                                            <div className="text-gray-600 font-semibold">{stat.label}</div>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="mb-12">
                                <h2 className="text-4xl font-bold text-center mb-4 text-gray-800">
                                    Choose Your Dashboard
                                </h2>
                                <p className="text-center text-gray-600 mb-12 text-lg">
                                    Explore our three powerful platforms designed for safety and success
                                </p>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    {dashboards.map((dashboard) => {
                                        const Icon = dashboard.icon;
                                        return (
                                            <div
                                                key={dashboard.id}
                                                onMouseEnter={() => setHoveredCard(dashboard.id)}
                                                onMouseLeave={() => setHoveredCard(null)}
                                                className={`group relative bg-white rounded-3xl overflow-hidden shadow-2xl transform transition-all duration-500 cursor-pointer ${
                                                    hoveredCard === dashboard.id ? 'scale-105 -translate-y-2' : 'scale-100'
                                                }`}
                                                onClick={() => window.location.href = dashboard.link}
                                            >
                                                <div className={`bg-gradient-to-br ${dashboard.color} p-8 text-white relative overflow-hidden`}>
                                                    <div className="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-full -mr-16 -mt-16"></div>
                                                    <div className="absolute bottom-0 left-0 w-24 h-24 bg-white opacity-10 rounded-full -ml-12 -mb-12"></div>
                                                    
                                                    <div className="relative z-10">
                                                        <Icon className="w-16 h-16 mb-4" style={{width: '64px', height: '64px'}} />
                                                        <h3 className="text-2xl font-bold mb-2">{dashboard.title}</h3>
                                                        <p className="text-white text-opacity-90 text-sm">{dashboard.subtitle}</p>
                                                    </div>
                                                </div>

                                                <div className="p-6">
                                                    <p className="text-gray-600 mb-6 leading-relaxed">
                                                        {dashboard.description}
                                                    </p>

                                                    <div className="space-y-2 mb-6">
                                                        {dashboard.features.map((feature, fidx) => (
                                                            <div key={fidx} className="flex items-center gap-2">
                                                                <CheckCircle className="w-5 h-5 text-green-500 flex-shrink-0" style={{width: '20px', height: '20px'}} />
                                                                <span className="text-sm text-gray-700">{feature}</span>
                                                            </div>
                                                        ))}
                                                    </div>

                                                    <button className={`w-full bg-gradient-to-r ${dashboard.color} text-white py-4 rounded-xl font-bold text-lg transition-all duration-300 flex items-center justify-center gap-2 group-hover:shadow-2xl`}>
                                                        Explore Dashboard
                                                        <ArrowRight className={`w-5 h-5 transition-transform duration-300 ${
                                                            hoveredCard === dashboard.id ? 'translate-x-1' : ''
                                                        }`} style={{width: '20px', height: '20px'}} />
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="bg-gradient-to-r from-purple-600 via-pink-600 to-rose-600 rounded-3xl p-12 text-white text-center shadow-2xl">
                                <div className="flex items-center justify-center gap-3 mb-6">
                                    <Shield className="w-12 h-12" style={{width: '48px', height: '48px'}} />
                                    <Heart className="w-10 h-10 animate-pulse" style={{width: '40px', height: '40px'}} />
                                    <Lock className="w-12 h-12" style={{width: '48px', height: '48px'}} />
                                </div>
                                <h2 className="text-4xl font-bold mb-4">Built on Trust. Powered by AI.</h2>
                                <p className="text-xl text-white text-opacity-90 max-w-3xl mx-auto mb-6">
                                    Every connection is protected by our advanced AI that monitors for scams, fake profiles, and suspicious activities in real-time.
                                </p>
                                <div className="flex flex-wrap items-center justify-center gap-6 text-sm">
                                    <div className="flex items-center gap-2">
                                        <CheckCircle className="w-5 h-5" style={{width: '20px', height: '20px'}} />
                                        <span>Aadhaar Verification</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <CheckCircle className="w-5 h-5" style={{width: '20px', height: '20px'}} />
                                        <span>Video KYC</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <CheckCircle className="w-5 h-5" style={{width: '20px', height: '20px'}} />
                                        <span>Background Checks</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <CheckCircle className="w-5 h-5" style={{width: '20px', height: '20px'}} />
                                        <span>24/7 AI Monitoring</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <footer className="max-w-7xl mx-auto px-4 py-8 mt-12 border-t border-gray-200">
                            <div className="text-center text-gray-600">
                                <p className="mb-2">© 2024 TrustHub Platform. All rights reserved.</p>
                                <p className="text-sm">Making online connections safer, one verification at a time. 💕</p>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<TrustHubLanding />, document.getElementById('root'));
    </script>
</body>
</html>
